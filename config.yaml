name : "Financial-News-Analysis"
author : "Pranav Rao"
version : "v1"

topic:
  data:
    raw: "data/topic/raw"
    processed: "data/topic/processed"
    production: "data/topic/production"
    version: "v1"
  model:
    path:
    version: "v1"

sentiment:
  data:
    raw: "data/sentiment/raw"
    processed: "data/sentiment/processed"
    production: "data/sentiment/production"
    version: "v4"
    split_ratio:
      - 0.25
      - 0.25
    random_state: 42
    no_classes: 3
    embed_len: 128
  model:
    name: "distilbert-base-uncased"
    path: "models/sentiment/v1"
    version: "v1"
    hyperparams:
      lr: 2e-5
      train_batch_size: 32
      eval_batch_size: 64
      epochs: 1
      weight_decay: 0.01

deployment:
  logs:
  version:

post-production:
  logs:
