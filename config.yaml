name : "Financial-News-Analysis"
author : "Pranav Rao"
version : "v1"

topic:
  data:
    raw: "data/topic/raw"
    processed: "data/topic/processed"
    production: "data/topic/production"
    version: "v3"
    train_valid_split: 0.25
    random_state : 42
    embed_len: 128
    no_classes: 20
  model:
    name: "huawei-noah/TinyBERT_General_4L_312D"
    path: "models/topic/v1"
    version: "v1"
    hyperparams:
      lr: 3e-5
      train_batch_size: 32
      eval_batch_size: 64
      epochs: 5
      weight_decay: 0.01

sentiment:
  data:
    raw: "data/sentiment/raw"
    processed: "data/sentiment/processed"
    production: "data/sentiment/production"
    version: "v1"
  model:
    path:
    version: "v1"

deployment:
  logs:
  version:

post-production:
  logs:
