version: '3.8'

services:
  model_server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: financial_model_server
    command: python3 run src/app.py --server.port=6969 --server.address=0.0.0.0
    ports:
      - 6969:6969
      - 8000:8000
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - /config.yaml:/app/config.yaml
    environment:
      - PYTHONUNBUFFERED=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
        limits:
          memory: 8G
  
  alert_server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: financial_alert_api
    command: python3 run src/mail.py
    ports:
      - 5001:5001
    volumes:
      - /config.yaml:/app/config.yaml
    env_file:
      - .env
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus_server
    ports:
    - 9090:9090
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    depends_on:
      - model_server
  
  grafana:
    image: grafana/grafana:latest
    container_name: grafana_dashboard
    ports:
      - 3000:3000
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
  