version: '3.8'

services:
  model_server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: financial_model_server
    command: python3 run src/app.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - 8501:8501
      - 8000:8000
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - /config.yaml:/app/config.yaml
    environment:
      - PYTHONUNBUFFERED=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
        limits:
          memory: 8G
  alert_server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: financial_alert_api
    command: python3 run src/mail.py
    ports:
      - 5002:5002
    volumes:
      - /config.yaml:/app/config.yaml
    env_file:
      - .env
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus_server
    ports:
    - 9090:9090
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    depends_on:
      - model_server
  grafana:
    image: grafana/grafana:latest
    container_name: grafana_dashboard
    ports:
      - 3000:3000
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
  mlflow_ui:
    command: mlflow server --backend-store-uri sqlite:///./mlflow.db --default-artifact-root ./models --host 0.0.0.0 --port 5000
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - /config.yaml:/app/config.yaml
      - /mlflow.db:/app/mlflow.db
  mlflow_serve:
    command: mlflow models serve -m "runs:/<run_name>/model" -p 5001 --env-manager local
    volumes:
      - ./mlruns:/app/mlruns